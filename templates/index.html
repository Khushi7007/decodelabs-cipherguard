<!DOCTYPE html>
<html>

<head>

    <title>Caesar Cipher</title>

    <link rel="stylesheet"
          href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🔐 Caesar Cipher Encryption</h1>

<form method="POST">

<textarea
name="text"
placeholder="Enter your message"
required></textarea>

<input
type="number"
name="shift"
placeholder="Enter Shift Key"
required>

<button type="submit">

Encrypt & Decrypt

</button>

</form>

{% if encrypted %}

<div class="output">

<h2>Encrypted Text</h2>

<p>{{ encrypted }}</p>

<h2>Decrypted Text</h2>

<p>{{ decrypted }}</p>

</div>

{% endif %}

</div>

<script src="{{ url_for('static',filename='script.js') }}"></script>

</body>

</html>
